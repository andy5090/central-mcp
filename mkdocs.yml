site_name: central-mcp
site_description: Coding agent-agnostic MCP hub for managing multiple coding agents.
site_url: https://central-mcp.org/
repo_url: https://github.com/andy5090/central-mcp
repo_name: andy5090/central-mcp
edit_uri: ""   # hide the per-page "Edit on GitHub" pencil icon
copyright: 'Stamped 2026 · <a href="https://github.com/andy5090/central-mcp/blob/main/LICENSE">MIT licensed</a> · Made for terminals'

# Flat HTML output (`/quickstart.html` instead of `/quickstart/index.html`).
# Required for Cloudflare R2: R2 serves objects literally and does not
# auto-resolve `/foo/` to `/foo/index.html`. Flat URLs let R2 serve every
# page directly. The remaining edge case — root `/` → `/index.html` — is
# handled by a Cloudflare Transform Rule (URL rewrite) at the zone level.
use_directory_urls: false

theme:
  name: material
  custom_dir: overrides
  logo: logo.png
  favicon: favicon-256x256.png
  features:
    # navigation.instant intentionally disabled — incompatible with the
    # mkdocs-static-i18n language switcher (the contextual link breaks
    # under instant navigation). Page transitions do a full reload, which
    # is acceptable for our content size.
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - js/hero.js

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - CLI reference: cli.md
  - MCP tools: mcp-tools.md
  - Observation: observation.md
  - Workspaces: architecture/workspaces.md
  - Roadmap: ROADMAP.md
  - Changelog: changelog.md

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Home: 홈
            Quickstart: 빠른 시작
            CLI reference: CLI 레퍼런스
            MCP tools: MCP 도구
            Observation: 관찰 모드
            Workspaces: 워크스페이스
            Roadmap: 로드맵
            Changelog: 변경 이력
  - include-markdown

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false   # suppress "Made with Material for MkDocs" footer line
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/andy5090/central-mcp
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/central-mcp/
