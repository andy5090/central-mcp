site_name: central-mcp
site_description: Coding agent-agnostic MCP hub for managing multiple coding agents.
site_url: https://central-mcp.org/
repo_url: https://github.com/andy5090/central-mcp
repo_name: andy5090/central-mcp
edit_uri: edit/main/docs/
copyright: 'Stamped 2026 · <a href="https://github.com/andy5090/central-mcp/blob/main/LICENSE">MIT licensed</a> · Made for terminals'

# Flat HTML output (`/quickstart.html` instead of `/quickstart/index.html`).
# Required for Cloudflare R2: R2 serves objects literally and does not
# auto-resolve `/foo/` to `/foo/index.html`. Flat URLs let R2 serve every
# page directly. The remaining edge case — root `/` → `/index.html` — is
# handled by a Cloudflare Transform Rule (URL rewrite) at the zone level.
use_directory_urls: false

theme:
  name: material
  custom_dir: overrides
  logo: logo.png
  favicon: favicon-256x256.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - js/hero.js

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - CLI reference: cli.md
  - MCP tools: mcp-tools.md
  - Observation: observation.md
  - Workspaces: architecture/workspaces.md
  - Roadmap: ROADMAP.md
  - Changelog: changelog.md

plugins:
  - search
  - include-markdown

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false   # suppress "Made with Material for MkDocs" footer line
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/andy5090/central-mcp
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/central-mcp/
