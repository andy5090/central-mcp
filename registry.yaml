#   central-mcp project registry
#
#   Single source of truth for every project the hub knows about.
#   Edit this file directly. The MCP server re-reads it on every tool call,
#   so changes take effect without restart.
#
#   Schema (per project):
#     name:        short identifier, used in dispatch calls
#     path:        absolute path to the project working directory
#     agent:       which agent CLI runs in this pane (claude | codex | gemini | cursor | shell)
#     tmux:
#       session:   tmux session name
#       window:    tmux window name
#       pane:      tmux pane index (int) within the window
#     description: free-form, shown in list_projects
#     tags:        optional list of labels for filtering

projects:
  - name: gluecut-dawg
    path: /Users/andy/Projects/gluecut-dawg
    agent: claude
    tmux:
      session: central
      window: projects
      pane: 0
    description: "First test project for central-mcp dispatch."
    tags: [test, phase0]
